services:

  postgres:
    image: postgres:15
    container_name: retailmax_postgres
    environment:
      POSTGRES_DB: retailmax
      POSTGRES_USER: retailmax_user
      POSTGRES_PASSWORD: retailmax_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmax_user -d retailmax"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.50.20
    container_name: retailmax_metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: retailmax_user
      MB_DB_PASS: retailmax_pass
      MB_DB_HOST: postgres
      JAVA_TIMEZONE: America/Guatemala
    volumes:
      - ./metabase-data:/metabase-data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  metabase-setup:
    image: curlimages/curl:latest
    container_name: retailmax_setup
    depends_on:
      metabase:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Verificando si Metabase ya esta configurado..."

        SETUP_TOKEN=$(curl -sf http://metabase:3000/api/session/properties | \
          grep -o '"setup-token":"[^"]*"' | \
          sed 's/"setup-token":"//;s/"//')

        if [ -z "$SETUP_TOKEN" ]; then
          echo "==> Metabase ya esta configurado. Nada que hacer."
          exit 0
        fi

        echo "==> Configurando Metabase con usuario de calificacion..."
        curl -sf -X POST http://metabase:3000/api/setup \
          -H "Content-Type: application/json" \
          -d "{
            \"token\": \"$SETUP_TOKEN\",
            \"user\": {
              \"email\": \"calificar@uvg.edu.gt\",
              \"password\": \"secret123+\",
              \"first_name\": \"Calificador\",
              \"last_name\": \"UVG\",
              \"site_name\": \"RetailMax\"
            },
            \"database\": {
              \"engine\": \"postgres\",
              \"name\": \"RetailMax DB\",
              \"details\": {
                \"host\": \"postgres\",
                \"port\": 5432,
                \"dbname\": \"retailmax\",
                \"user\": \"retailmax_user\",
                \"password\": \"retailmax_pass\"
              }
            },
            \"prefs\": {
              \"site_name\": \"RetailMax Analytics\",
              \"allow_tracking\": false
            }
          }"

        echo ""
        echo "==> Listo. Accede en http://localhost:3000"
        echo "==> Usuario: calificar@uvg.edu.gt"
        echo "==> Password: secret123+"

volumes:
  postgres_data: